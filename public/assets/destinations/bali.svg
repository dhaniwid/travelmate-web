<svg id="landmark-bali" viewBox="0 0 390 650" xmlns="http://www.w3.org/2000/svg">
  <g id="layer-sky">
    <defs>
      <linearGradient id="bali-sky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#060F1E"/>
        <stop offset="40%" stop-color="#0D5463"/>
        <stop offset="75%" stop-color="#C2500A"/>
        <stop offset="100%" stop-color="#7A2E0A"/>
      </linearGradient>
    </defs>
    <rect width="390" height="650" fill="url(#bali-sky)"/>
    <circle cx="45" cy="38" r="1.2" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="100" cy="25" r="1" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="165" cy="50" r="1.5" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="220" cy="20" r="1" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="280" cy="42" r="1.2" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="340" cy="30" r="1" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="60" cy="72" r="1" fill="#FFFFFF" opacity="0.6"/>
    <path d="M300 58 Q312 46 324 58 Q312 53 300 58Z" fill="#F5E6C8" opacity="0.9"/>
  </g>

  <g id="layer-background">
    <!-- Ocean horizon -->
    <rect x="0" y="400" width="390" height="50" fill="#2D6A8A" opacity="0.5"/>
    <rect x="0" y="430" width="390" height="80" fill="#2D6A8A" opacity="0.7"/>
    <!-- Wave hints -->
    <path d="M0 415 Q50 408 100 415 Q150 422 200 415 Q250 408 300 415 Q350 422 390 415" fill="none" stroke="#0D9488" stroke-width="2" opacity="0.4"/>
  </g>

  <g id="layer-midground">
    <!-- Rice terrace horizontal lines -->
    <path d="M0 480 Q195 460 390 480" fill="none" stroke="#1A3A5C" stroke-width="6"/>
    <path d="M0 510 Q195 490 390 510" fill="none" stroke="#1A3A5C" stroke-width="6"/>
    <path d="M0 540 Q195 522 390 540" fill="none" stroke="#1A3A5C" stroke-width="5"/>
    <!-- Leaning coconut palms -->
    <line x1="55" y1="490" x2="40" y2="390" stroke="#1A3A5C" stroke-width="5"/>
    <ellipse cx="36" cy="386" rx="18" ry="7" fill="#1A3A5C"/>
    <ellipse cx="28" cy="390" rx="14" ry="5" fill="#1A3A5C" transform="rotate(-25,28,390)"/>
    <line x1="340" y1="485" x2="358" y2="382" stroke="#1A3A5C" stroke-width="5"/>
    <ellipse cx="361" cy="378" rx="18" ry="7" fill="#1A3A5C"/>
    <ellipse cx="370" cy="382" rx="14" ry="5" fill="#1A3A5C" transform="rotate(25,370,382)"/>
  </g>

  <g id="layer-foreground">
    <!-- Rock base in water (Tanah Lot) -->
    <ellipse cx="195" cy="590" rx="90" ry="40" fill="#0A1628"/>
    <rect x="120" y="560" width="150" height="40" fill="#0A1628"/>
    <!-- Rock texture irregular edge -->
    <path d="M120 565 Q140 550 160 565 Q175 552 195 560 Q215 548 235 562 Q255 550 270 565" fill="#0A1628"/>

    <!-- Pura / temple on rock -->
    <!-- Base platform -->
    <rect x="153" y="490" width="84" height="75" fill="#0A1628"/>
    <!-- Temple tiers (meru/pagoda style) -->
    <rect x="160" y="470" width="70" height="24" fill="#0A1628"/>
    <rect x="167" y="450" width="56" height="24" fill="#0A1628"/>
    <rect x="174" y="432" width="42" height="22" fill="#0A1628"/>
    <rect x="180" y="415" width="30" height="20" fill="#0A1628"/>
    <rect x="184" y="400" width="22" height="18" fill="#0A1628"/>
    <!-- Temple spire -->
    <polygon points="184,400 195,375 206,400" fill="#0A1628"/>
    <circle cx="195" cy="372" r="5" fill="#0A1628"/>
    <!-- Gate arch -->
    <rect x="186" y="555" width="18" height="20" fill="#0D5463" opacity="0.5"/>
    <!-- Ceremonial flags -->
    <line x1="165" y1="490" x2="165" y2="440" stroke="#0A1628" stroke-width="2"/>
    <polygon points="165,440 180,445 165,452" fill="#F97316" opacity="0.7"/>
    <line x1="225" y1="490" x2="225" y2="440" stroke="#0A1628" stroke-width="2"/>
    <polygon points="225,440 210,445 225,452" fill="#F97316" opacity="0.7"/>
    <!-- Water reflection hint -->
    <rect x="150" y="592" width="90" height="8" fill="#0D9488" opacity="0.2"/>
  </g>
</svg>
