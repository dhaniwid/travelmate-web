<svg id="landmark-jakarta" viewBox="0 0 390 650" xmlns="http://www.w3.org/2000/svg">
  <g id="layer-sky">
    <defs>
      <linearGradient id="jakarta-sky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#060F1E"/>
        <stop offset="40%" stop-color="#0D5463"/>
        <stop offset="75%" stop-color="#C2500A"/>
        <stop offset="100%" stop-color="#7A2E0A"/>
      </linearGradient>
    </defs>
    <rect width="390" height="650" fill="url(#jakarta-sky)"/>
    <circle cx="42" cy="35" r="1.2" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="98" cy="22" r="1" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="160" cy="48" r="1.5" fill="#FFFFFF" opacity="0.6"/>
    <circle cx="215" cy="18" r="1" fill="#FFFFFF" opacity="0.9"/>
    <circle cx="275" cy="40" r="1.2" fill="#FFFFFF" opacity="0.7"/>
    <circle cx="338" cy="28" r="1" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="62" cy="70" r="1" fill="#FFFFFF" opacity="0.6"/>
    <path d="M320 55 Q332 43 344 55 Q332 50 320 55Z" fill="#F5E6C8" opacity="0.9"/>
  </g>

  <g id="layer-background">
    <!-- Jakarta bay horizon hint -->
    <rect x="0" y="420" width="390" height="30" fill="#2D6A8A" opacity="0.4"/>
    <!-- City skyline distant -->
    <rect x="20" y="395" width="30" height="30" fill="#2D6A8A"/>
    <rect x="55" y="382" width="25" height="43" fill="#2D6A8A"/>
    <rect x="290" y="390" width="28" height="35" fill="#2D6A8A"/>
    <rect x="325" y="378" width="22" height="47" fill="#2D6A8A"/>
    <rect x="352" y="392" width="18" height="33" fill="#2D6A8A"/>
  </g>

  <g id="layer-midground">
    <!-- Kota Tua (Old Town) colonial rooftops -->
    <rect x="30" y="430" width="80" height="70" fill="#1A3A5C"/>
    <polygon points="30,430 70,410 110,430" fill="#1A3A5C"/>
    <rect x="280" y="435" width="80" height="65" fill="#1A3A5C"/>
    <polygon points="280,435 320,415 360,435" fill="#1A3A5C"/>
    <!-- Windows with glow -->
    <rect x="48" y="445" width="10" height="14" fill="#F97316" opacity="0.5"/>
    <rect x="68" y="445" width="10" height="14" fill="#F97316" opacity="0.4"/>
    <rect x="295" y="450" width="10" height="14" fill="#F97316" opacity="0.5"/>
    <rect x="318" y="450" width="10" height="14" fill="#F97316" opacity="0.4"/>
    <!-- Fatahillah Square fountain hint -->
    <circle cx="195" cy="495" r="18" fill="none" stroke="#1A3A5C" stroke-width="4"/>
    <circle cx="195" cy="495" r="6" fill="#1A3A5C"/>
  </g>

  <g id="layer-foreground">
    <!-- Monas obelisk base platform -->
    <rect x="165" y="590" width="60" height="30" fill="#0A1628"/>
    <rect x="172" y="570" width="46" height="25" fill="#0A1628"/>
    <rect x="178" y="555" width="34" height="20" fill="#0A1628"/>
    <!-- Obelisk shaft — tall and narrow -->
    <polygon points="183,555 195,230 207,555" fill="#0A1628"/>
    <!-- Gold flame at apex -->
    <!-- Flame blob -->
    <ellipse cx="195" cy="220" rx="14" ry="18" fill="#F97316" opacity="0.9"/>
    <polygon points="186,228 195,195 204,228" fill="#F97316" opacity="0.95"/>
    <ellipse cx="195" cy="215" rx="8" ry="10" fill="#FFD700" opacity="0.8"/>
    <!-- Platform detail band -->
    <rect x="162" y="588" width="66" height="5" fill="#0D9488" opacity="0.4"/>
  </g>
</svg>
