    <!-- Hill right -->
    <ellipse cx="338" cy="415" rx="95"  ry="48" fill="#2D6A8A" opacity="0.70"/>
    <!-- Horizon ground fill -->
    <rect x="0" y="390" width="390" height="30" fill="#2D6A8A"/>
  </g>

