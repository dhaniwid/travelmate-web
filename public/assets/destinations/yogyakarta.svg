    <circle cx="218" cy="397" r="5.5" fill="#0A1628"/><rect x="215" y="386" width="5" height="11" fill="#0A1628"/>
    <circle cx="240" cy="400" r="5.5" fill="#0A1628"/><rect x="237" y="389" width="5" height="11" fill="#0A1628"/>

