    <circle cx="172" cy="381" r="5" fill="#0A1628"/><rect x="169" y="371" width="5" height="10" fill="#0A1628"/>
    <circle cx="195" cy="380" r="5" fill="#0A1628"/><rect x="192" y="370" width="5" height="10" fill="#0A1628"/>
    <circle cx="218" cy="381" r="5" fill="#0A1628"/><rect x="215" y="371" width="5" height="10" fill="#0A1628"/>

