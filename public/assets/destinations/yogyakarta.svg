<svg id="landmark-yogyakarta" viewBox="0 0 390 650" xmlns="http://www.w3.org/2000/svg">

  <!-- Layer 1: Sky — dusk gradient -->
  <g id="layer-sky">
    <defs>
      <linearGradient id="yogya-sky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"   stop-color="#060F1E"/>
        <stop offset="38%"  stop-color="#0D5463"/>
        <stop offset="72%"  stop-color="#C2500A"/>
        <stop offset="100%" stop-color="#7A2E0A"/>
      </linearGradient>
    </defs>
    <rect width="390" height="650" fill="url(#yogya-sky)"/>
    <!-- Stars -->
    <circle cx="30"  cy="36"  r="1.2" fill="#FFFFFF" opacity="0.80"/>
    <circle cx="72"  cy="22"  r="1"   fill="#FFFFFF" opacity="0.70"/>
    <circle cx="130" cy="48"  r="1.5" fill="#FFFFFF" opacity="0.62"/>
    <circle cx="195" cy="18"  r="1"   fill="#FFFFFF" opacity="0.88"/>
    <circle cx="255" cy="44"  r="1.2" fill="#FFFFFF" opacity="0.74"/>
    <circle cx="312" cy="30"  r="1"   fill="#FFFFFF" opacity="0.78"/>
    <circle cx="360" cy="58"  r="1.5" fill="#FFFFFF" opacity="0.56"/>
    <!-- Crescent moon -->
    <path d="M52 58 Q65 46 78 58 Q65 53 52 58Z" fill="#F5E6C8" opacity="0.90"/>
  </g>

  <!-- Layer 2: Background — Merapi cone + rolling hills -->
  <g id="layer-background">
